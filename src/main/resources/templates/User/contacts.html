<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{}, ~{::#content},~{::title},~{::script})}">

<head>
    <title>All Your Contacts</title>
</head>

<body>
    <div id="content">
        <!-- sidebar -->

        <!-- user is logged in : sidebar -->

        <div class="pt-20">

            <div class="grid grid-cols-12">

                <div th:if="${loggedInUser}" class="col-span-2">
                    <div data-th-replace="~{user/sidebar :: sidebar}"></div>
                </div>

                <div class="col-span-1 "></div>

                <div class="col-span-12 md:col-span-8">
                    <div class="">
                        <h1 class="text-5xl text-center">All Your Contacts</h1>
                        <p class="text-center">List of all contacts...</p>

                        <div class="contacts_container p-5">
                            <div
                                class="flex md:flex-row flex-col items-center px-4 justify-between bg-white dark:bg-gray-900">
                                <form data-th-object="${contactSearchForm}" action=""
                                    data-th-action="@{'/user/contacts/search'}">
                                    <div
                                        class="flex space-x-3 p-5 items-center justify-start flex-column flex-wrap md:flex-row space-y-4 md:space-y-0 pb-4 ">
                                        <!-- select box   -->

                                        <div>
                                            <select data-th-field="*{field}" id="countries_disabled"
                                                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500">
                                                <option selected value="">Select Field</option>
                                                <option value="name">Name</option>
                                                <option value="phone">Phone</option>
                                                <option value="email">Email</option>
                                            </select>
                                        </div>
                                        <label for="table-search" class="sr-only">Search</label>
                                        <div class="relative">
                                            <div
                                                class="absolute inset-y-0 rtl:inset-r-0 start-0 flex items-center ps-3 pointer-events-none">
                                                <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" aria-hidden="true"
                                                    xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
                                                    <path stroke="currentColor" stroke-linecap="round"
                                                        stroke-linejoin="round" stroke-width="2"
                                                        d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z" />
                                                </svg>
                                            </div>
                                            <input data-th-field="*{value}" type="text" id="table-search-users"
                                                class="block p-2 ps-10 text-sm text-gray-900 border border-gray-300 rounded-lg w-80 bg-gray-50 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                                                placeholder="Search for users" />
                                        </div>
                                        <div>
                                            <button type="submit" class="px-3 py-2 bg-gray-800 text-white rounded">
                                                Search
                                            </button>
                                        </div>
                                    </div>
                                </form>

                                <div class="flex space-x-2">
                                    <button type="button" onclick="exportExcel()"
                                        class="px-3 py-2 bg-green-700 hover:bg-green-800 text-white rounded flex items-center shadow-lg transform active:scale-95 transition-all duration-150">
                                        <i class="fa-solid fa-file-excel mr-2"></i> Excel
                                    </button>

                                    <button type="button" onclick="exportPdf()"
                                        class="px-3 py-2 bg-red-700 hover:bg-red-800 text-white rounded flex items-center shadow-lg transform active:scale-95 transition-all duration-150">
                                        <i class="fa-solid fa-file-pdf mr-2"></i> PDF
                                    </button>
                                </div>

                            </div>

                            <div class="relative overflow-x-auto shadow-md sm:rounded-lg">
                                <div data-th-replace="~{message :: messagebox}"></div>


                                <table id="contact-table" data-th-if="${pageContact.totalElements>0}"
                                    class="w-full text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400">
                                    <thead
                                        class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
                                        <tr>
                                            <th scope="col" class="px-6 py-3">Name</th>
                                            <th scope="col" class="px-6 py-3">Phone</th>
                                            <th scope="col" class="px-6 py-3">Links</th>
                                            <th scope="col" class="px-6 py-3">Action</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr data-th-object="${c}" data-th-each="c  : ${pageContact.getContent()}"
                                            class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-600">
                                            <th scope="row"
                                                class="flex items-center px-6 py-4 text-gray-900 whitespace-nowrap dark:text-white">
                                                <img onerror="this.src='https://www.svgrepo.com/show/335455/profile-default.svg'"
                                                    class="w-10 h-10 rounded-full" data-th-src="@{*{picture}}"
                                                    src="/docs/images/people/profile-picture-1.jpg" alt="Jese image" />
                                                <div class="ps-3">
                                                    <div class="text-base font-semibold" data-th-text="*{name}">
                                                        Neil Sims
                                                    </div>
                                                    <div class="font-normal text-gray-500" data-th-text="*{email}">
                                                        neil.sims@flowbite.com
                                                    </div>
                                                </div>
                                            </th>
                                            <td class="px-6 py-4">
                                                <i class="fa-solid fa-phone w-4 h-4"></i>
                                                <span data-th-text="*{phoneNumber}"></span>
                                            </td>
                                            <td class="px-6 py-4">
                                                <div class="flex items-center space-x-3">
                                                    <div data-th-if="*{favorite}"
                                                        class="h-2.5 w-2.5 rounded-full bg-green-500 me-2"></div>

                                                    <!-- direct website link -->
                                                    <a data-th-if="*{websiteLink}" data-th-href="*{websiteLink}"
                                                        target="_blank">
                                                        <i class="fa-solid fa-xl fa-link"></i>
                                                    </a>

                                                    <!-- direct linkedin link -->
                                                    <a data-th-if="*{linkedInLink}" data-th-href="*{linkedInLink}"
                                                        target="_blank">
                                                        <i class="fa-brands fa-xl fa-linkedin"></i>
                                                    </a>
                                                    
                                                </div>
                                            </td>
                                            <td class="px-6 py-4">
                                                <div>
                                                    <!-- <a data-th-href="@{'/user/contacts/delete/'+*{id}}">
                                                <i class="fa-solid w-6 h-6 fa-trash"></i>
                                               </a> -->

                                                    <!-- delete contact -->
                                                    <button th:onclick="deleteContact([[${c.id}]])">
                                                        <i class="fa-solid w-6 h-6 fa-trash"></i>
                                                    </button>
                                                    <!-- update contact -->
                                                    <a data-th-href="@{'/user/contacts/view/'+*{id}}">
                                                        <i class="fa-solid w-6 h-6 fa-pen"></i></a>

                                                    <!-- viewcontact -->
                                                    <button th:onclick="loadContactdata([[${c.id}]])">
                                                        <i class="fa-solid fa-eye"></i>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>

                                <!-- pagination component  -->
                                <div data-th-if="${pageContact.totalElements>0}"
                                    class="pagination_container bg-white dark:bg-gray-800 p-5 text-center">
                                    <nav aria-label="Page navigation example">
                                        <ul class="inline-flex -space-x-px text-base h-10">
                                            <li data-th-unless="${pageContact.first}">
                                                <a data-th-href="@{'/user/contacts?size='+${pageSize}+'&page=' + ${pageContact.number-1}}"
                                                    href="#"
                                                    class="flex items-center justify-center px-4 h-10 ms-0 leading-tight text-gray-500 bg-white border border-e-0 border-gray-300 rounded-s-lg hover:bg-gray-100 hover:text-gray-700 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white">Previous</a>
                                            </li>
                                            <li
                                                data-th-each="index :  ${#numbers.sequence(0,pageContact.totalPages-1)}">
                                                <a data-th-href="@{'/user/contacts?size='+${pageSize}+'&page='+${index}}"
                                                    href="#"
                                                    data-th-classappend="${index==pageContact.number? 'bg-blue-50  dark:bg-gray-600' : 'bg-white dark:bg-gray-800'}"
                                                    class="flex items-center justify-center px-4 h-10 leading-tight text-gray-500 border border-gray-300 hover:bg-gray-100 hover:text-gray-700 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white">
                                                    <span data-th-text="${index+1}"></span>
                                                </a>
                                            </li>

                                            <li data-th-unless="${pageContact.last}">
                                                <a data-th-href="@{'/user/contacts?size='+${pageSize}+'&page=' + ${pageContact.number+1}}"
                                                    href="#"
                                                    class="flex items-center justify-center px-4 h-10 leading-tight text-gray-500 bg-white border border-gray-300 rounded-e-lg hover:bg-gray-100 hover:text-gray-700 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white">Next</a>
                                            </li>
                                        </ul>
                                    </nav>
                                </div>
                                <h1 class="text-5xl text-center dark:bg-gray-800 dark:text-white bg-white p-4"
                                    data-th-if="${pageContact.totalElements<=0}">
                                    No result found
                                </h1>
                            </div>
                        </div>
                    </div>
                    <div data-th-replace="~{ user/contact_modals :: contact}"></div>
                </div>


            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.js"></script>

        <!-- Excel Export Library -->
        <script src="https://cdn.jsdelivr.net/npm/@linways/table-to-excel@1.0.4/dist/tableToExcel.min.js"></script>
        
        <!-- PDF Export Libraries -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

        <script data-th-src="@{'/js/contacts.js'}"></script>
        <script>
            function exportExcel() {
                TableToExcel.convert(document.getElementById("contact-table"), {
                    name: "contacts.xlsx",
                    sheet: {
                        name: "Sheet 1",
                    },
                });
            }

            function exportPdf() {
                const { jsPDF } = window.jspdf;
                const doc = jsPDF();
                
                // Add title
                doc.setFontSize(18);
                doc.text("All Your Contacts", 14, 20);
                doc.setFontSize(11);
                doc.setTextColor(100);
                
                // Add generated date
                const date = new Date().toLocaleDateString();
                doc.text(`Generated on: ${date}`, 14, 30);

                // Export table
                doc.autoTable({
                    html: '#contact-table',
                    startY: 35,
                    columns: [
                        { header: 'Name', dataKey: 'name' },
                        { header: 'Email', dataKey: 'email' },
                        { header: 'Phone', dataKey: 'phone' },
                        { header: 'Address', dataKey: 'address' }
                    ],
                    // We need to map the table content correctly because the HTML table 
                    // has complex structures (images, icons) in cells.
                    body: Array.from(document.querySelectorAll('#contact-table tbody tr')).map(tr => {
                        const nameDiv = tr.querySelector('th div.ps-3 div.text-base');
                        const emailDiv = tr.querySelector('th div.ps-3 div.font-normal');
                        const phoneSpan = tr.querySelector('td:nth-child(2) span');
                        
                        return [
                            nameDiv ? nameDiv.innerText.trim() : '',
                            emailDiv ? emailDiv.innerText.trim() : '',
                            phoneSpan ? phoneSpan.innerText.trim() : '',
                            // Address isn't in this table directly, but we show it as a column if needed 
                            // or omit based on current table structure.
                        ];
                    }),
                    theme: 'striped',
                    headStyles: { fillStyle: [31, 41, 55] }, // Dark slate blue
                });

                doc.save("contacts.pdf");
            }
        </script>
</body>

</html>
